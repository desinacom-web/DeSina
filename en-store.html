<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeSina Store | Shop Online</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; -webkit-user-select: none; user-select: none; }
        img { pointer-events: none; -webkit-user-drag: none; }
        .store-card { background: white; border-radius: 20px; overflow: hidden; transition: 0.4s; border: 1px solid #eee; }
        .store-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .product-img-container { width: 100%; height: 200px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-img { width: 85%; height: 85%; object-fit: contain; transition: 0.5s; }
        .store-card:hover .product-img { transform: scale(1.1); }
        .buy-btn { background: #25d366; color: white; padding: 10px; border-radius: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; width: 100%; }
        .buy-btn:hover { background: #128c7e; }
        .badge { background: black; color: white; border-radius: 50%; padding: 2px 7px; font-size: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-2">
            <div class="flex items-center gap-4">
                <a href="en.html" class="text-gray-600 font-bold flex items-center gap-2 hover:text-red-600 transition">
                    Home <i class="fas fa-arrow-left"></i>
                </a>
                <img src="logo.jpg" style="height: 38px; border-radius: 8px;">
            </div>
            <div class="text-red-600 text-2xl relative">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge absolute -top-2 -right-2">10</span>
            </div>
        </div>
    </nav>
    <section class="py-12 bg-gray-900 text-center">
        <h1 class="text-white text-3xl md:text-5xl font-extrabold"><span class="text-red-600">DeSina</span> Store</h1>
        <p class="text-gray-400 mt-2">Premium Quality & Modern Fashion</p>
    </section>
    <div class="container mx-auto py-12 px-4">
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <script>
                for (let i = 1; i <= 10; i++) {
                    document.write(`
                        <div class="store-card">
                            <div class="product-img-container"><img src="logo.jpg" class="product-img"></div>
                            <div class="p-5 text-left">
                                <h3 class="text-sm font-bold text-gray-800 mb-2">Premium DeSina Product ${i}</h3>
                                <p class="text-red-600 font-extrabold text-lg mb-4">000 EGP</p>
                                <a href="https://wa.me/201001283311?text=Order Product No. ${i}" target="_blank" class="buy-btn">
                                    <i class="fab fa-whatsapp"></i> Order Now
                                </a>
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>
    <footer class="bg-white py-8 text-center border-t border-gray-100 text-gray-400 text-xs font-bold">
        All rights reserved to DeSina © 2026
    </footer>
    <script>
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's')) { e.preventDefault(); }
        });
    </script>
</body>
</html>
