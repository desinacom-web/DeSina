<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeSina Store | Premium Collection</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; scroll-behavior: smooth; }
        /* تعديل عشان DeSina تظهر صح في العناوين */
        h1, h2, h3, .filter-btn { font-family: 'Oswald', sans-serif; }
        .store-card { background: white; border-radius: 20px; overflow: hidden; transition: 0.4s; border: 1px solid #eee; cursor: pointer; }
        .product-img-container { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .buy-btn { background: #25d366; color: white; padding: 12px; border-radius: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; border: none; transition: 0.3s; }
        .search-input { width: 100%; padding: 12px 20px 12px 45px; border-radius: 50px; border: 2px solid #eee; outline: none; }
        .filter-btn { padding: 8px 20px; border-radius: 50px; background: white; border: 1px solid #ddd; font-weight: bold; text-transform: uppercase; }
        .filter-btn.active { background: #ef4444; color: white; border-color: #ef4444; }
        .star-gold { color: #FFD700 !important; }
        .review-card { background: #ffffff; border-radius: 25px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        #review-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10001; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 450px; padding: 35px; border-radius: 30px; position: relative; }
    </style>
</head>
<body>

    <div id="toast" style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#10b981; color:white; padding:12px 30px; border-radius:50px; z-index:9999;">Model added to cart! ✅</div>

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-2">
            <div class="flex items-center gap-4">
                <img src="logo.jpg" style="height: 38px; border-radius: 8px;">
                <a href="en.html" class="text-gray-600 font-bold flex items-center gap-2 hover:text-red-600 transition text-sm">HOME <i class="fas fa-arrow-left"></i></a>
            </div>
            <div class="text-red-600 text-2xl relative cursor-pointer" onclick="sendOrderToWhatsApp()">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-badge" class="bg-black text-white rounded-full px-2 py-0.5 text-[10px] absolute -top-2 -right-2 hidden">0</span>
            </div>
        </div>
    </nav>

    <div class="max-w-[600px] mx-auto my-5 px-4 relative">
        <i class="fas fa-search absolute left-8 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Search for a specific model..." onkeyup="displayProducts()">
    </div>

    <div class="flex flex-wrap justify-center gap-3 mb-10 px-4">
        <button class="filter-btn active" onclick="setCategory('all', this)">All Models</button>
        <button class="filter-btn" onclick="setCategory('summer', this)">Summer</button>
        <button class="filter-btn" onclick="setCategory('winter', this)">Winter</button>
    </div>

    <div class="container mx-auto py-2 px-4 mb-20">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 min-h-[300px]"></div>
    </div>

    <section class="bg-gray-50 py-24 px-4 border-t border-gray-100">
        <div class="container mx-auto text-center">
            <div class="mb-16">
                <h2 class="text-3xl md:text-5xl font-extrabold mb-4 text-gray-900" style="text-transform: uppercase;">
                    What clients say about <span class="text-red-600" style="text-transform: none;">DeSina</span> ⭐
                </h2>
                <button class="bg-red-600 text-white px-8 py-3 rounded-full font-bold mt-5" onclick="toggleReviewModal(true)">Share Your Experience</button>
            </div>
            
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide review-card text-center">
                        <div class="flex justify-center mb-5 star-gold"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                        <p class="text-gray-700">"The material is excellent and delivery was very fast. DeSina is a truly professional brand."</p>
                        <h4 class="mt-8 font-bold text-gray-900">Ahmed Mahmoud</h4>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="review-modal">
        <div class="modal-content">
            <i class="fas fa-times absolute right-6 top-6 text-gray-400 cursor-pointer" onclick="toggleReviewModal(false)"></i>
            <h3 class="text-2xl font-bold mb-6 text-center">Your Feedback ✍️</h3>
            <input type="text" id="revName" placeholder="Your Name" class="w-full border-2 p-3 rounded-2xl mb-4">
            <textarea id="revMsg" placeholder="Your Comment" class="w-full border-2 p-3 rounded-2xl h-28 mb-4"></textarea>
            <button onclick="submitReview()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold">Send via WhatsApp</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const totalModels = 11;
        const productPrice = "1000 EGP";
        const phoneNumber = "201001283311";
        const grid = document.getElementById('product-grid');
        let currentFilter = 'all';

        function displayProducts() {
            grid.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            for (let i = 1; i <= totalModels; i++) {
                const modelName = `Model COD-${i < 10 ? '0' + i : i}`;
                const category = (i % 2 === 0) ? 'winter' : 'summer';
                if ((currentFilter === 'all' || category === currentFilter) && modelName.toLowerCase().includes(search)) {
                    grid.innerHTML += `
                        <div class="store-card">
                            <div class="product-img-container"><img src="cod${i}.jpeg" class="product-img"></div>
                            <div class="p-4">
                                <h3 class="text-xs md:text-sm font-bold text-gray-800">${modelName}</h3>
                                <p class="text-red-600 font-extrabold mb-4">${productPrice}</p>
                                <button class="buy-btn" onclick="addToCart('${modelName}', event)"><i class="fas fa-shopping-cart"></i> Buy Now</button>
                            </div>
                        </div>`;
                }
            }
        }
        displayProducts();

        function setCategory(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            displayProducts();
        }

        let cartItems = [];
        function addToCart(name, e) {
            cartItems.push(name);
            const b = document.getElementById('cart-badge');
            b.innerText = cartItems.length; b.style.display = 'block';
            const t = document.getElementById('toast');
            t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500);
        }

        function sendOrderToWhatsApp() {
            if (cartItems.length === 0) return alert("Cart is empty!");
            let msg = `New Order from DeSina 🚀\n----------\n` + cartItems.map((v,i) => `${i+1}- ${v}`).join("\n");
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function toggleReviewModal(show) { document.getElementById('review-modal').style.display = show ? 'flex' : 'none'; }
        
        function submitReview() {
            const name = document.getElementById('revName').value;
            const msg = document.getElementById('revMsg').value;
            if (!name || !msg) return alert("Fill all fields");
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent("Review: " + msg + " by " + name)}`, '_blank');
            toggleReviewModal(false);
        }

        new Swiper(".mySwiper", { loop: true, autoplay: { delay: 3500 } });
    </script>
</body>
</html>
