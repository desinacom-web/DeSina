<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديسينا | DeSina</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .hero-section {
            background-image: linear-gradient(135deg, rgba(0, 0, 0, 0.95) 0%, rgba(20, 20, 20, 0.98) 100%);
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .nav-link { color: #374151; font-weight: bold; transition: 0.3s; }
        .nav-link:hover { color: #ef4444; }
        .product-link { color: #ef4444 !important; font-weight: 800; }
        .main-logo { height: 40px; border-radius: 8px; }
        .hero-logo { height: 110px; border-radius: 15px; margin: 0 auto 20px; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .service-card { transition: 0.3s; border-top: 4px solid #ef4444; }
        .service-card:hover { transform: translateY(-10px); }

        /* تنسيق المنيو - الأندرويد والويندوز */
        @media (min-width: 769px) {
            #mobile-menu { display: flex !important; position: static; background: none; box-shadow: none; width: auto; padding: 0; flex-direction: row; }
            .burger-icon { display: none !important; }
        }

        @media (max-width: 768px) {
            #mobile-menu { 
                display: none; 
                flex-direction: column; 
                width: 40%; 
                position: fixed; 
                top: 64px; /* التكة هنا: خليناها تبدأ من تحت الناف بار (تعديل الارتفاع حسب الحاجة) */
                left: 0; 
                height: 60vh; /* نفس الحجم اللي عجبك */
                background: rgba(45, 45, 48, 0.96); 
                backdrop-filter: blur(12px);
                padding: 20px 15px; /* قللنا البادنج اللي فوق عشان بدأت من تحت */
                box-shadow: 5px 5px 15px rgba(0,0,0,0.3); 
                z-index: 1000; 
                border-right: 2px solid #ef4444;
                border-bottom-right-radius: 20px;
                overflow-y: auto;
            }
            #mobile-menu.active { display: flex !important; animation: slideInLeft 0.4s ease-out; }
            .nav-link, .product-link { 
                padding: 10px 5px; 
                border-bottom: 1px solid rgba(255,255,255,0.05); 
                width: 100%; 
                text-align: right; 
                color: white !important;
                font-size: 14px;
            }
        }

        @keyframes slideInLeft { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .whatsapp-float {
            position: fixed; width: 60px; height: 60px; bottom: 20px; left: 20px; background-color: #25d366; color: #FFF;
            border-radius: 50px; text-align: center; font-size: 30px; box-shadow: 2px 2px 3px #999; z-index: 1001;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <a href="https://wa.me/201001283311" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <nav class="bg-white shadow-md p-3 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4 relative">
            <div class="flex items-center gap-6">
                <img src="logo.jpg" class="main-logo">
                <div id="mobile-menu" class="hidden md:flex items-center gap-8">
                    <a href="catalog.html" class="product-link menu-item">الكتالوج</a>
                    <a href="#digital-services" class="nav-link menu-item">الرقمية</a>
                    <a href="#industrial-services" class="nav-link menu-item">الصناعية</a>
                    <a href="about.html" class="nav-link menu-item">فريق العمل</a>
                    <a href="privacy.html" class="nav-link menu-item opacity-80" style="font-size: 12px;">سياسة الخصوصية</a>
                    <a href="#contact" class="nav-link menu-item">اتصل بنا</a>
                    <a href="en.html" class="text-blue-400 font-bold md:hidden menu-item">English</a>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <a href="en.html" class="hidden md:block text-blue-600 font-bold border-l-2 pl-4 border-gray-200 hover:underline">English</a>
                <div class="burger-icon md:hidden cursor-pointer" id="burger-btn">
                    <i class="fas fa-bars text-2xl text-gray-700"></i>
                </div>
                <div class="hidden md:block">
                    <a href="https://wa.me/201001283311" target="_blank" class="bg-green-500 text-white px-6 py-2 rounded-full font-bold flex items-center gap-2 hover:bg-green-600 transition shadow-sm">
                        <i class="fab fa-whatsapp"></i> تواصل معنا
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero-section text-white py-20 text-center px-4">
        <div class="container mx-auto">
            <img src="logo.jpg" class="hero-logo">
            <h1 class="text-4xl md:text-7xl font-extrabold mb-6">مرحبا بكم في <span class="text-red-600">DeSina</span></h1>
            <p class="text-xl md:text-2xl text-gray-300 mb-12 font-bold">نمزج بين الأناقة والابتكار في عالم الأزياء والخدمات الرقمية.</p>
        </div>
    </section>

    <footer id="contact" class="bg-gray-950 text-white py-16 px-6 text-center">
        <p class="mt-10 text-gray-600 text-sm font-bold">جميع حقوق الملكية محفوظة لشركة DeSina © 2026</p>
    </footer>

    <script>
        const burgerBtn = document.getElementById('burger-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuItems = document.querySelectorAll('.menu-item');

        burgerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mobileMenu.classList.toggle('active');
        });

        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                mobileMenu.classList.remove('active');
            });
        });

        document.addEventListener('click', (e) => {
            if (!mobileMenu.contains(e.target) && !burgerBtn.contains(e.target)) {
                mobileMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
