<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتالوج ديسينا | DeSina Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        .cat-img { height: 450px; width: 100%; object-fit: cover; border-radius: 25px; transition: 0.5s; }

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-10">
            <div class="bg-white p-5 rounded-[2.5rem] shadow-xl cat-card"><img src="cod 1.jpeg" class="cat-img mb-4 shadow-lg"><h3 class="font-bold text-2xl text-gray-800 italic">Model 1</h3></div>
            <div class="bg-white p-5 rounded-[2.5rem] shadow-xl cat-card"><img src="cod 2.jpeg" class="cat-img mb-4 shadow-lg"><h3 class="font-bold text-2xl text-gray-800 italic">Model 2</h3></div>
            <div class="bg-white p-5 rounded-[2.5rem] shadow-xl cat-card"><img src="cod 3.jpeg" class="cat-img mb-4 shadow-lg"><h3 class="font-bold text-2xl text-gray-800 italic">Model 3</h3></div>
            <div class="bg-white p-5 rounded-[2.5rem] shadow-xl cat-card"><img src="cod 4.jpeg" class="cat-img mb-4 shadow-lg"><h3 class="font-bold text-2xl text-gray-800 italic">Model 4</h3></div>
            <div class="bg-white p-5 rounded-[2.5rem] shadow-xl cat-card"><img src="cod 5.jpeg" class="cat-img mb-4 shadow-lg"><h3 class="font-bold text-2xl text-gray-800 italic">Model 5</h3></div>
            <div class="bg-white p-5 rounded-[2.5rem] shadow-xl cat-card"><img src="cod 6.jpeg" class="cat-img mb-4 shadow-lg"><h3 class="font-bold text-2xl text-gray-800 italic">Model 6</h3></div>
            <div class="bg-white p-5 rounded-[2.5rem] shadow-xl cat-card"><img src="cod 7.jpeg" class="cat-img mb-4 shadow-lg"><h3 class="font-bold text-2xl text-gray-800 italic">Model 7</h3></div>
            <div class="bg-white p-5 rounded-[2.5rem] shadow-xl cat-card"><img src="cod 8.jpeg" class="cat-img mb-4 shadow-lg"><h3 class="font-bold text-2xl text-gray-800 italic">Model 8</h3></div>

        <a href="index.html" class="mt-20 inline-block bg-gray-900 text-white px-16 py-4 rounded-full font-bold text-2xl shadow-2xl hover:bg-red-700 transition">العودة للرئيسية</a>
    </div>
</body>
</html>
