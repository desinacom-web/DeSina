<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتالوج ديسينا | DeSina Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        /* الصور تظهر كاملة بدون قص وبأبعادها الأصلية */
        .cat-img { 
            width: auto; 
            max-width: 100%; 
            height: auto; 
            max-height: 350px; 
            display: block; 
            margin: 0 auto; 
            border-radius: 12px; 
            object-fit: contain; 
            background-color: #ffffff;
        }
        /* الخط الرمادي الغامق والعدل (بدون ميلان) */
        .main-title { color: #374151; font-style: normal; font-weight: bold; }
        .model-name { color: #4b5563; font-style: normal; font-weight: bold; }
        
        .cat-card { transition: 0.4s; background: white; }
        .cat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="py-10 px-6">
    <div class="container mx-auto text-center">
        <h1 class="text-3xl md:text-5xl font-bold main-title mb-4">DeSina Catalog 2026</h1>
        <p class="text-gray-500 mb-12 text-lg font-bold">الأناقة والجودة في كل قطعة</p>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 1.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 1</h3></div>
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 2.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 2</h3></div>
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 3.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 3</h3></div>
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 4.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 4</h3></div>
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 5.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 5</h3></div>
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 6.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 6</h3></div>
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 7.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 7</h3></div>
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 8.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 8</h3></div>
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 9.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 9</h3></div>
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 10.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 10</h3></div>
            <div class="p-3 rounded-2xl shadow-xl cat-card"><img src="cod 11.jpg" class="cat-img mb-3"><h3 class="font-bold text-xl model-name">Model 11</h3></div>
        </div>
        
        <a href="index.html" class="mt-16 inline-block bg-gray-700 text-white px-10 py-3 rounded-full font-bold text-lg shadow-xl hover:bg-gray-900 transition">العودة للرئيسية</a>
    </div>
</body>
</html>
