<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتالوج ديسينا | DeSina Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        /* التعديل الذهبي: الصور تظهر كاملة بدون قص */
        .cat-img { 
            width: 100%; 
            height: auto; 
            max-height: 350px; /* ارتفاع مناسب جداً للويندوز والموبايل */
            object-fit: contain; /* أهم سطر: بيخلي الصورة تظهر كاملة داخل الإطار */
            background-color: #fff; /* خلفية بيضاء ورا الصورة لو أبعادها مختلفة */
            border-radius: 12px;
            transition: 0.3s;
        }
        .cat-card { transition: 0.3s; border: 1px solid #e5e7eb; }
        .cat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="py-10 px-4">
    <div class="container mx-auto text-center">
        <h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-4">DeSina Catalog 2026</h1>
        <p class="text-gray-600 mb-12 text-lg italic font-bold italic">الأناقة والجودة في كل قطعة</p>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 1.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 1</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 2.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 2</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 3.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 3</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 4.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 4</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 5.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 5</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 6.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 6</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 7.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 7</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 8.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 8</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 9.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 9</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 10.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 10</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-sm cat-card"><img src="cod 11.jpeg" class="cat-img mb-3"><h3 class="font-bold text-gray-800">Model 11</h3></div>
        </div>
        
        <a href="index.html" class="mt-16 inline-block bg-gray-900 text-white px-10 py-3 rounded-full font-bold text-lg hover:bg-red-700 transition shadow-lg">العودة للرئيسية</a>
    </div>
</body>
</html>
