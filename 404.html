<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeSina | صفحة غير موجودة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: white; overflow: hidden; }
        .glitch { text-shadow: 2px 2px #ff0000; animation: glitch 1s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .bg-gradient-red { background: linear-gradient(45deg, #ff0000, #8b0000); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <script>
        (function() {
            var currentPath = window.location.pathname;
            var fileName = currentPath.split('/').pop();
            
            // قائمة الملفات التي نريد تصحيحها أوتوماتيكياً
            var pages = {
                "index.html": "index.html",
                "store.html": "Store.html",
                "services.html": "Services.html",
                "about.html": "About.html",
                "contact.html": "Contact.html"
            };

            // لو الزائر داخل بـ Small والملف موجود في القائمة، حوله فوراً للـ Capital
            if (pages[fileName.toLowerCase()] && fileName !== pages[fileName.toLowerCase()]) {
                var newPath = currentPath.replace(fileName, pages[fileName.toLowerCase()]);
                window.location.replace(newPath);
            }
        })();
    </script>

    <div class="text-center px-4">
        <h1 class="text-9xl font-bold glitch text-red-600 mb-4">404</h1>
        <h2 class="text-2xl md:text-3xl font-semibold mb-6">عذراً.. يبدو أنك سلكت طريقاً غير ممهد!</h2>
        <p class="text-gray-400 mb-8 max-w-md mx-auto">الصفحة التي تبحث عنها قد تم نقلها أو تحديث اسمها لتناسب عالم ديسينا الجديد.</p>
        
        <div class="flex flex-col md:flex-row gap-4 justify-center">
            <a href="https://desinacom-web.github.io/DeSina/index.html" class="bg-gradient-red hover:scale-105 transition-transform px-8 py-3 rounded-full font-bold flex items-center justify-center gap-2">
                <i class="fas fa-home"></i> الرئيسية
            </a>
            <a href="https://desinacom-web.github.io/DeSina/Store.html" class="border border-red-600 hover:bg-red-600 transition-colors px-8 py-3 rounded-full font-bold flex items-center justify-center gap-2">
                <i class="fas fa-shopping-bag"></i> المتجر
            </a>
        </div>

        <div class="mt-16 opacity-50">
            <p class="text-sm mb-4 italic">برعاية شركاء الإبداع</p>
            <div class="flex justify-center gap-8 grayscale hover:grayscale-0 transition-all">
                <i class="fab fa-spotify text-3xl"></i>
                <i class="fas fa-music text-3xl"></i> <i class="fab fa-apple text-3xl"></i>
            </div>
        </div>
    </div>

</body>
</html>
