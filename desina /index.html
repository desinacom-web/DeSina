<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeSina | جاري التوجيه للنسخة المحدثة</title>
    
    <meta http-equiv="refresh" content="0; URL='https://desinacom-web.github.io/DeSina/'" />

    <style>
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .container { padding: 20px; }
        .loader { 
            border: 4px solid #1a1a1a; 
            border-top: 4px solid #ff0000; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .brand { color: #ff0000; font-weight: bold; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h2 style="margin-bottom: 10px;">لحظة واحدة..</h2>
        <p>يتم الآن نقلك إلى الرابط الرسمي لـ <span class="brand">DeSina</span></p>
    </div>

    <script>
        // الرادار الذكي للتحويل اللحظي
        (function() {
            var currentUrl = window.location.href;
            // استبدال الجزء السمول بالكابيتال مع الحفاظ على بقية الرابط (لو فيه صفحة داخلية)
            var newUrl = currentUrl.replace(/\/desina(\/|$)/i, "/DeSina/");
            
            // التأكد من أن التحويل سيتم للرابط الصحيح
            if (newUrl !== currentUrl) {
                window.location.replace(newUrl);
            } else {
                // تحويل احتياطي للرئيسية الكابيتال لو فشل الاستبدال
                window.location.replace("https://desinacom-web.github.io/DeSina/");
            }
        })();
    </script>

</body>
</html>
